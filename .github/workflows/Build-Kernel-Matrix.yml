name: Build Kernel Matrix

on:
  workflow_dispatch:
    inputs:
      LinuxFamily:
        description: 'Linux Family（逗号分隔，例如 rockchip64,meson64,meson,rk35xx）'
        required: true
        default: 'rockchip64'
        type: string
      BRANCH:
        description: 'Linux Branch（逗号分隔，例如 current,edge,legacy,vendor,flippy）'
        default: 'current'
        required: true
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  Prepare-Matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
    steps:
      - name: Build matrix
        id: matrix
        env:
          LINUX_FAMILY_INPUT: ${{ inputs.LinuxFamily }}
          BRANCH_INPUT: ${{ inputs.BRANCH }}
        run: |
          python3 - <<'PY'
          import itertools
          import json
          import os

          def parse_csv(name):
              values = [item.strip() for item in os.environ[name].split(",") if item.strip()]
              if not values:
                  raise SystemExit(f"{name} is empty")
              return values

          def is_valid_combo(family, branch):
              if family == "rk35xx":
                  return branch in {"vendor", "flippy"}
              if family == "meson":
                  return branch in {"current"}
              if family in {"rockchip64", "meson64"}:
                  return branch != "vendor"
              return True

          families = parse_csv("LINUX_FAMILY_INPUT")
          branches = parse_csv("BRANCH_INPUT")

          include = [
              {"linux_family": family, "branch": branch}
              for family, branch in itertools.product(families, branches)
              if is_valid_combo(family, branch)
          ]

          max_parallel = 6

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              print(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}", file=fh)
              print(f"count={len(include)}", file=fh)
              print(f"max_parallel={max_parallel}", file=fh)
          PY

      - name: Show matrix
        run: |
          echo "Build combinations: ${{ steps.matrix.outputs.count }}"
          echo "Max parallel: ${{ steps.matrix.outputs.max_parallel }}"
          echo '${{ steps.matrix.outputs.matrix }}'

  Build-Kernel:
    needs: Prepare-Matrix
    if: ${{ needs.Prepare-Matrix.outputs.count != '0' }}
    name: Build [ ${{ matrix.linux_family }} ${{ matrix.branch }} ]
    runs-on: ubuntu-26.04-arm
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.Prepare-Matrix.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.Prepare-Matrix.outputs.matrix) }}
    env:
      BRANCH: ${{ matrix.branch }}
    steps:
      - name: Record start time
        run: |
          echo "START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "${GITHUB_ENV}"
          echo "LinuxFamily: ${{ matrix.linux_family }}"
          echo "BRANCH: ${{ matrix.branch }}"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker_images_ids=$(docker images -q)
          [ -n "${docker_images_ids}" ] && docker rmi ${docker_images_ids}
          docker system prune -a -f
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* openjdk* mysql* php* mongodb* moby* snapd* android* || true
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ}"

      - name: Create simulated physical disk
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          LOOP_MNT=$(sudo losetup -f --show /mnt/mnt.img)
          LOOP_ROOT=$(sudo losetup -f --show /root.img)
          sudo pvcreate "${LOOP_MNT}"
          sudo pvcreate "${LOOP_ROOT}"
          sudo vgcreate -y github "${LOOP_MNT}" "${LOOP_ROOT}"
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /mnt/workdir
          sudo mount /dev/github/runner /mnt/workdir
          sudo chown -R ${USER}:${USER} /mnt/workdir
          df -Th

      - name: Download source code
        working-directory: /mnt/workdir
        run: |
          df -hT ${PWD}
          git clone -q --single-branch --depth=1 --branch=main https://github.com/armbian/build.git build
          ln -sf /mnt/workdir/build ${GITHUB_WORKSPACE}/build

      - name: Apply patches
        working-directory: /mnt/workdir/build
        run: |
          "${GITHUB_WORKSPACE}/scripts/apply_patches.sh"
          "${GITHUB_WORKSPACE}/scripts/rename_to_conf.sh"
          "${GITHUB_WORKSPACE}/scripts/fix_mknod_ubuntu26.sh"

      - name: Compile Kernel [ ${{ matrix.linux_family }} ${{ matrix.branch }} ]
        working-directory: /mnt/workdir/build
        run: |
          BoardFamily=${{ matrix.linux_family }}
          case "${BoardFamily}" in
            rockchip64) BoardFamily="nanopct4" ;;
            meson64)    BoardFamily="aml-s9xx-box" ;;
            rk35xx)     BoardFamily="rock-5c" ;;
            meson)      BoardFamily="onecloud" ;;
          esac
          [ "${{ matrix.branch }}" = "flippy" ] && EXTRA_ARGS="EXTRAWIFI=no DISABLE_KERNEL_PATCHES=yes" || EXTRA_ARGS=""
          ./compile.sh kernel BOARD=${BoardFamily} BRANCH=${{ matrix.branch }} PREFER_DOCKER=yes DOCKER_ARMBIAN_BASE_IMAGE=ubuntu:resolute DEB_COMPRESS=xz SHARE_LOG=yes ${EXTRA_ARGS}

      - name: Prepare Kernel Metadata
        working-directory: /mnt/workdir/build/output/debs
        run: |
          Kernel_File=$(find . -maxdepth 1 -type f -name 'linux-image-*.deb' -printf '%f\n' | head -n 1)
          if [ -n "${Kernel_File}" ]; then
            echo "Kernel_File: ${Kernel_File}"
            KERNEL_VERSION=$(echo "${Kernel_File}" | cut -d '_' -f 5 | cut -d '-' -f 1)
            [[ ! "${KERNEL_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && KERNEL_VERSION="${KERNEL_VERSION}.0"
            echo "KERNEL_VERSION=${KERNEL_VERSION}" >> "${GITHUB_ENV}"
            echo "KERNEL_VERSION: ${KERNEL_VERSION}"
            LINUX_FAMILY=$(echo "${Kernel_File}" | cut -d '_' -f 1 | awk -F '-' '{print $NF}')
            [ "${{ matrix.branch }}" = "flippy" ] && LINUX_FAMILY="${LINUX_FAMILY}-flippy"
            echo "LINUX_FAMILY=${LINUX_FAMILY}" >> "${GITHUB_ENV}"
            echo "LINUX_FAMILY: ${LINUX_FAMILY}"
          else
            echo "No matching file found. Available files are:"
            ls -1 "/mnt/workdir/build/output/debs"
            exit 1
          fi
          shopt -s nullglob
          matching_files_array=(linux-dtb*.deb linux-headers*.deb linux-image*.deb linux-libc*.deb)
          shopt -u nullglob
          if [ ${#matching_files_array[@]} -gt 0 ]; then
            renamed_files=()
            for f in "${matching_files_array[@]}"; do
              base_name=$(echo "${f}" | sed -E 's/_.*//')
              newf="${base_name}-${KERNEL_VERSION}.deb"
              if [ "${f}" != "${newf}" ]; then
                echo "Renaming: ${f} -> ${newf}"
                mv "${f}" "${newf}"
              fi
              renamed_files+=("${newf}")
            done
            tar -czf "../kernel-${KERNEL_VERSION}-${LINUX_FAMILY}.tar.gz" "${renamed_files[@]}" || { echo "Failed to create tar.gz file"; exit 1; }
            echo "Compressed matching files to kernel-${KERNEL_VERSION}-${LINUX_FAMILY}.tar.gz"
          else
            echo "No matching files found for compression."
            ls -1 "/mnt/workdir/build/output/debs"
            exit 1
          fi
          tar -tzf "../kernel-${KERNEL_VERSION}-${LINUX_FAMILY}.tar.gz" > /dev/null || { echo "Failed to verify tar.gz file"; exit 1; }
          echo "TARGET_FILE=kernel-${KERNEL_VERSION}-${LINUX_FAMILY}.tar.gz" >> "${GITHUB_ENV}"

      - name: Upload Kernel to Release
        uses: ophub/upload-to-releases@main
        with:
          tag: "Kernel-${{ env.LINUX_FAMILY }}"
          artifacts: "/mnt/workdir/build/output/kernel-${{ env.KERNEL_VERSION }}-${{ env.LINUX_FAMILY }}.tar.gz"
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Armbian Kernel Packages for ${{ env.LINUX_FAMILY }}
            - Usage: After extraction, install the packages (e.g. `dpkg -i *.deb`)
            - Included: `linux-dtb` `linux-headers` `linux-image` `linux-libc-dev`

      - name: Prepare SHA256 Metadata
        working-directory: /mnt/workdir/build/output
        run: |
          "${GITHUB_WORKSPACE}/scripts/sha256.sh"

      - name: Upload SHA256 to Release
        uses: ophub/upload-to-releases@main
        with:
          tag: "Kernel-${{ env.LINUX_FAMILY }}"
          artifacts: "/mnt/workdir/build/output/sha256.txt"
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### Armbian Kernel Packages for ${{ env.LINUX_FAMILY }}
            - Usage: After extraction, install the packages (e.g. `dpkg -i *.deb`)
            - Included: `linux-dtb` `linux-headers` `linux-image` `linux-libc-dev`

      - name: Calculate Workflow Duration
        id: duration
        run: |
          start_time="${{ env.START_TIME }}"
          echo "Start time: ${start_time}"
          end_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "End time: ${end_time}"
          duration=$(( $(date -d "${end_time}" +%s) - $(date -d "${start_time}" +%s) ))
          echo "Workflow duration: ${duration} seconds"
          echo "DURATION=${duration}" >> "${GITHUB_ENV}"

      - name: Telegram notification
        run: |
          HOURS=$(( ${{ env.DURATION }} / 3600 ))
          MINUTES=$(( ( ${{ env.DURATION }} % 3600 ) / 60 ))
          SECONDS=$(( ${{ env.DURATION }} % 60 ))
          if [ ${HOURS} -eq 0 ]; then
            MSG="
          🎉 *${{ env.KERNEL_VERSION }}-${{ env.LINUX_FAMILY }} 编译完成！*
          🕒 _${MINUTES} 分 ${SECONDS} 秒_"
          else
            MSG="
          🎉 *${{ env.KERNEL_VERSION }}-${{ env.LINUX_FAMILY }} 编译完成！*
          🕒 _${HOURS} 小时 ${MINUTES} 分 ${SECONDS} 秒_"
          fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] || [ -z "${{ secrets.TELEGRAM_ID }}" ]; then
            echo "Telegram secrets are incomplete, skipping notification."
            exit 0
          else
            echo "Sending message: ${MSG}"
            curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_ID }}&text=${MSG}&parse_mode=Markdown" >/dev/null 2>&1
          fi

  Cleanup:
    if: ${{ always() }}
    needs:
      - Prepare-Matrix
      - Build-Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Delete releases and workflows runs
        uses: ophub/delete-releases-workflows@main
        with:
          delete_releases: false
          releases_keep_latest: 10
          delete_workflows: true
          workflows_keep_day: 3
          gh_token: ${{ secrets.GITHUB_TOKEN }}
